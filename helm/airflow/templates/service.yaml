apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-webserver
  labels:
    app: {{ .Release.Name }}
spec:
  type: {{ .Values.webserver.service.type }}
  ports:
    - port: {{ .Values.webserver.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}
    component: webserver
