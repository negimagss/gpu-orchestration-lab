image:
  repository: "apache/airflow"  # Official Docker Hub image (skip ECR)
  tag: "2.8.1"
  pullPolicy: IfNotPresent

webserver:
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      memory: "2Gi"
      cpu: "1"
    requests:
      memory: "1Gi"
      cpu: "500m"

scheduler:
  replicas: 1
  resources:
    limits:
      memory: "2Gi"
      cpu: "1"
    requests:
      memory: "1Gi"
      cpu: "500m"

# Using LocalExecutor for demo — simple, no need for Celery
executor: LocalExecutor

# SQLite for demo — use PostgreSQL in prod
database:
  type: sqlite

env:
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"

nodeSelector: {}
