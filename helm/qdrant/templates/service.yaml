apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: 6333
      protocol: TCP
      name: http
    - port: {{ .Values.service.grpcPort }}
      targetPort: 6334
      protocol: TCP
      name: grpc
  selector:
    app: {{ .Release.Name }}
